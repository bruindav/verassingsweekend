  <!-- Windows center -->
  <rect x="145" y="128" width="20" height="28" fill="#2C4A3E" rx="2"/>
  <rect x="235" y="128" width="20" height="28" fill="#2C4A3E" rx="2"/>
  <rect x="145" y="168" width="20" height="24" fill="#2C4A3E" rx="2"/>
  <rect x="235" y="168" width="20" height="24" fill="#2C4A3E" rx="2"/>
  <!-- Right house -->
  <rect x="290" y="138" width="90" height="82" fill="#B85A30"/>
  <polygon points="285,138 335,95 385,138" fill="#7A3A10"/>

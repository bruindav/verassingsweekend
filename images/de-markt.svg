<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs><linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A8C8DC"/><stop offset="100%" stop-color="#D0E8F0"/></linearGradient></defs>
  <rect width="400" height="280" fill="url(#sky5)"/>
  <rect x="0" y="200" width="400" height="80" fill="#7A9A5A"/>

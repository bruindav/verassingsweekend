
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mama ❤️</title>
<style>
  /* iOS fixes */
  * { -webkit-box-sizing: border-box; box-sizing: border-box; }
  body { -webkit-text-size-adjust: 100%; }
  button, a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  img { -webkit-user-select: none; max-width: 100%; }
  .photo-item { -webkit-transform: translateZ(0); } /* GPU acceleration */

  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --amber: #C8860A;
    --amber-light: #F5D98B;
    --amber-pale: #FDF6E3;
    --green-dark: #2C4A3E;
    --green-mid: #3D6B5C;
    --green-light: #EAF2EE;
    --ink: #1C1C1C;
    --warm-gray: #7A7060;
    --cream: #FEFAF2;
    --border: #DDD0A8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--ink); font-family: 'Lato', sans-serif; font-weight: 300; }

  /* HERO */
  .hero {
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    overflow: hidden;
    background: linear-gradient(160deg, #1a3028 0%, #2C4A3E 50%, #1e3d30 100%);
  }
  .hero-bg {
    display: none;
  }
  .hero > * { position: relative; z-index: 1; }
  .hero-label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--amber-light); font-weight: 700; margin-bottom: 28px;
    opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size:68px; font-size:clamp(36px,7vw,68px);
    color: #fff; line-height: 1.15; max-width: 700px;
    opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
  }
  .hero-title em { color: var(--amber-light); font-style: italic; }
  .hero-sub {
    margin-top: 24px; font-size: 18px; color: #d0e8df;
    line-height: 1.7; max-width: 500px;
    opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards;
  }
  .hero-names {
    margin-top: 36px; display: flex; gap: 12px; grid-gap: 12px; grid-gap: gap: 12px; grid-gap: 12px; flex-wrap: wrap; justify-content: center;
    opacity: 0; animation: fadeUp 0.8s ease 1.1s forwards;
  }
  .hero-name {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 20px; border-radius: 100px;
    font-size: 14px; letter-spacing: 1px;
  }
  .scroll-hint {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    color: #A8C4B8; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.8s ease 1.5s forwards;
    display: flex; flex-direction: column; align-items: center; gap: 8px; grid-gap: 8px; grid-gap: gap: 8px; grid-gap: 8px; z-index:1;
  }
  .scroll-arrow {
    width: 18px; height: 18px;
    border-right: 1.5px solid #A8C4B8; border-bottom: 1.5px solid #A8C4B8;
    transform: rotate(45deg); animation: bounce 1.5s ease infinite;
  }

  /* REVEAL */
  .reveal {
    background: var(--amber-pale); padding: 80px 24px;
    text-align: center; border-bottom: 2px solid var(--border);
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--amber); font-weight: 700; margin-bottom: 20px;
  }
  .eyebrow-light { color: var(--amber-light); }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size:44px; font-size:clamp(26px,4vw,44px);
    line-height: 1.2; margin-bottom: 24px;
  }
  .reveal .section-title { color: var(--green-dark); }
  .body-text {
    font-size: 17px; line-height: 1.85; color: var(--warm-gray);
    max-width: 620px; margin: 0 auto 36px;
  }
  .city-badge {
    display: inline-block; background: var(--green-dark);
    color: var(--amber-light); font-family: 'Playfair Display', serif;
    font-size: 30px; padding: 18px 48px; border-radius: 4px;
    letter-spacing: 2px; box-shadow: 0 8px 32px rgba(44,74,62,0.25);
  }

  /* BROERS INFO */
  .broers {
    background: var(--green-light); padding: 48px 24px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .broers-inner { max-width: 700px; margin: 0 auto; text-align: center; }
  .broers-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; grid-gap: 16px; grid-gap: gap: 16px; grid-gap: 16px; margin-top: 28px;
  }
  .broer-card {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 16px; text-align: center;
  }
  .broer-icon { font-size: 28px; margin-bottom: 8px; }
  .broer-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px; color: var(--green-dark); margin-bottom: 4px;
  }
  .broer-detail { font-size: 13px; color: var(--warm-gray); line-height: 1.5; }

  /* PRAKTISCH */
  .section { padding: 72px 24px; max-width: 880px; margin: 0 auto; }
  .cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px; grid-gap: 20px; grid-gap: gap: 20px; grid-gap: 20px;
  }
  .card {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 26px 22px;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(44,74,62,0.12); }
  .card-icon { font-size: 26px; margin-bottom: 12px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px; color: var(--green-dark); margin-bottom: 8px;
  }
  .card-text { font-size: 14px; line-height: 1.7; color: var(--warm-gray); }

  /* TIJDLIJN */
  .timeline-section {
    background: var(--green-dark); padding: 80px 24px; color: var(--cream);
  }
  .timeline-section .section-title { color: var(--cream); max-width: 860px; margin: 0 auto 48px; text-align: center; }
  .timeline { max-width: 680px; margin: 0 auto; position: relative; }
  .timeline::before {
    content: ''; position: absolute; left: 20px; top: 0; bottom: 0;
    width: 1px; background: rgba(200,134,10,0.3);
  }
  .timeline-item { display: flex; gap: 28px; grid-gap: 28px; grid-gap: gap: 28px; grid-gap: 28px; margin-bottom: 40px; }
  .timeline-dot {
    flex-shrink: 0; width: 42px; height: 42px; background: var(--amber);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 16px; position: relative; z-index: 1;
    box-shadow: 0 0 0 4px rgba(200,134,10,0.2);
  }
  .timeline-year {
    font-size: 11px; letter-spacing: 3px; color: var(--amber-light);
    font-weight: 700; text-transform: uppercase; margin-bottom: 4px;
  }
  .timeline-event {
    font-family: 'Playfair Display', serif; font-size: 18px;
    margin-bottom: 6px; color: var(--cream);
  }
  .timeline-detail { font-size: 14px; line-height: 1.65; color: #A8C4B8; }

  /* PLEKKEN */
  .plek-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
    gap: 22px; grid-gap: 22px; grid-gap: gap: 22px; grid-gap: 22px;
  }
  .plek-card {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: white;
  }
  .plek-header { padding: 22px; display: flex; align-items: flex-start; gap: 14px; grid-gap: gap: 14px; }
  .plek-number {
    width: 34px; height: 34px; background: var(--green-dark);
    color: var(--amber-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 15px; flex-shrink: 0;
  }
  .plek-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--green-dark); margin-bottom: 3px; }
  .plek-address { font-size: 12px; color: var(--warm-gray); }
  .plek-body { padding: 0 22px 22px; font-size: 14px; line-height: 1.7; color: var(--warm-gray); }
  .plek-tag {
    display: inline-block; margin-top: 10px; padding: 4px 12px;
    border-radius: 100px; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .tag-opa { background: #FDF0D0; color: var(--amber); }
  .tag-stad { background: var(--green-light); color: var(--green-dark); }
  .tag-verblijf { background: #E8F4F0; color: #2C6B5A; }

  /* FOTOALBUM BOULOGNE */
  .album-section {
    background: var(--ink); padding: 80px 24px;
  }
  .album-section .section-title { color: var(--cream); text-align: center; margin-bottom: 8px; }
  .album-intro { text-align: center; color: #999; font-size: 15px; margin-bottom: 40px; }
    .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px; grid-gap: 10px; grid-gap: gap: 10px; grid-gap: 10px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .photo-item {
    border-radius: 6px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .photo-item:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .photo-item img {
    width: 100%; height: auto; display: block;
  }
  .photo-caption {
    color: #888; font-size: 12px; letter-spacing: 1px;
    text-align: center; margin-top: 20px; text-transform: uppercase;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px;
    color: white; font-size: 32px; cursor: pointer; line-height: 1;
    background: none; border: none;
  }

  /* BRIEF */
  .brief {
    background: var(--amber-pale); border-top: 2px solid var(--border);
    padding: 80px 24px; text-align: center;
  }
  .brief-inner { max-width: 540px; margin: 0 auto; }
  .brief-quote {
    font-family: 'Playfair Display', serif;
    font-size:28px; font-size:clamp(19px,2.5vw,28px);
    font-style: italic; color: var(--green-dark);
    line-height: 1.55; margin-bottom: 32px;
  }
  .brief-sign { font-size: 15px; color: var(--warm-gray); line-height: 1.8; }
  .brief-sign strong { color: var(--green-dark); font-weight: 700; }
  .hearts { font-size: 26px; margin-top: 28px; letter-spacing: 8px; }

  /* ANIMATIES */
  @-webkit-keyframes fadeUp { from { opacity: 0; -webkit-transform: translateY(20px); } to { opacity: 1; -webkit-transform: translateY(0); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @-webkit-keyframes bounce { 0%, 100% { -webkit-transform: rotate(45deg) translateY(0); } 50% { -webkit-transform: rotate(45deg) translateY(5px); } }
  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(5px); }
  }
  .fade-in {
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease; -webkit-transition: opacity 0.7s ease, -webkit-transform 0.7s ease;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* WEER */
  .weer-section {
    background: #E8F4FD; padding: 48px 24px;
    border-top: 1px solid #BDD9EF; border-bottom: 1px solid #BDD9EF;
  }
  .weer-inner { max-width: 700px; margin: 0 auto; text-align: center; }
  .weer-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; grid-gap: 12px; grid-gap: gap: 12px; grid-gap: 12px; margin-top: 28px;
  }
  .weer-day {
    background: white; border-radius: 10px; padding: 16px 10px;
    border: 1px solid #C8DDEF; text-align: center;
  }
  .weer-datum { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 6px; }
  .weer-icon { font-size: 26px; margin: 6px 0; }
  .weer-temp { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--green-dark); }
  .weer-regen { font-size: 11px; color: #6699BB; margin-top: 4px; }
  .weer-badge { display: inline-block; background: var(--green-mid); color: white; border-radius: 100px; font-size: 11px; font-weight: 700; padding: 3px 10px; margin-top: 6px; }

  /* OPA FOTO */
  .opa-foto-section { background: var(--ink); padding: 72px 24px; }
  .opa-foto-inner { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; grid-gap: 48px; grid-gap: gap: 48px; grid-gap: 48px; align-items: center; }
  .opa-foto-img { border-radius: 4px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
  .opa-foto-img img { width: 100%; display: block; }
  .opa-foto-text {}
  .opa-foto-text .eyebrow { color: var(--amber-light); margin-bottom: 16px; display: block; }
  .opa-foto-text h2 { font-family: 'Playfair Display', serif; font-size:32px; font-size:clamp(22px,3vw,32px); color: var(--cream); margin-bottom: 16px; line-height: 1.3; }
  .opa-foto-text p { font-size: 15px; line-height: 1.75; color: #A8C4B8; }
  .opa-foto-text p + p { margin-top: 12px; }
  @media (max-width: 600px) {
    .opa-foto-inner { grid-template-columns: 1fr; }
    .weer-grid { grid-template-columns: repeat(2, 1fr); }
  }


  /* STAMBOOM */
  .sb-persoon {
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    width: 130px;
    flex-shrink: 0;
  }
  .sb-kind { width: 110px; }
  .sb-klein { width: 100px; }
  .sb-icon { font-size: 24px; margin-bottom: 6px; }
  .sb-naam {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--cream);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .sb-detail {
    font-size: 10px;
    color: #A8C4B8;
    line-height: 1.4;
    letter-spacing: 0.3px;
  }

</style>
</head>
